<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gōku Lab — Asistente</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul:        #00AEEF;
    --azul-oscuro: #0090C8;
    --amarillo:    #F5A800;
    --rojo:        #E63329;
    --verde:       #5CB85C;
    --blanco:      #FFFFFF;
    --gris-fondo:  #F4F7FB;
    --gris-borde:  #E2EAF4;
    --gris-texto:  #8899AA;
    --sombra:      0 2px 16px rgba(0,174,239,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--gris-fondo);
    font-family: 'Quicksand', sans-serif;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 15%, rgba(0,174,239,0.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 85%, rgba(245,168,0,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .chat-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--blanco);
    box-shadow: var(--sombra);
    border-left: 1px solid var(--gris-borde);
    border-right: 1px solid var(--gris-borde);
    padding-bottom: 52px;
  }

  /* ── HEADER ── */
  .header {
    padding: 14px 18px;
    background: var(--azul);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    right: -20px; top: -20px;
    width: 90px; height: 90px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }

  .header::before {
    content: '';
    position: absolute;
    right: 30px; bottom: -30px;
    width: 60px; height: 60px;
    background: rgba(245,168,0,0.15);
    border-radius: 50%;
  }

  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.4);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: relative;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-fallback { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 16px; color: var(--azul); }

  .header-info { flex: 1; }

  .header-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 15px; color: white;
  }

  .header-status {
    font-size: 12px; color: rgba(255,255,255,0.85);
    margin-top: 1px; display: flex; align-items: center; gap: 4px;
  }

  .dot-verde {
    width: 7px; height: 7px;
    background: #7FE87F; border-radius: 50%; display: inline-block;
    animation: pulso 2s infinite;
  }

  @keyframes pulso {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .header-badge {
    font-family: 'Nunito', sans-serif;
    font-size: 10px; font-weight: 700;
    color: var(--azul); background: white;
    padding: 3px 8px; border-radius: 20px;
    position: relative; z-index: 1;
  }

  /* ── MENSAJES ── */
  .messages {
    flex: 1; overflow-y: auto;
    padding: 16px 14px;
    display: flex; flex-direction: column; gap: 8px;
    scroll-behavior: smooth;
    background: var(--gris-fondo);
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 2px; }

  .date-sep {
    text-align: center; font-size: 11px;
    color: var(--gris-texto); margin: 4px 0 8px;
    letter-spacing: 0.06em; font-weight: 600;
  }

  .msg {
    display: flex; flex-direction: column;
    max-width: 80%;
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg.bot  { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg.bot .msg-row {
    display: flex; align-items: flex-end; gap: 6px;
  }

  .bot-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--azul);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }

  .bot-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .bot-icon-fallback { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 10px; color: white; }

  .bubble {
    padding: 10px 14px; border-radius: 18px;
    font-size: 14px; line-height: 1.55;
    word-break: break-word; font-weight: 500;
  }

  .msg.bot .bubble {
    background: white; color: #2D3748;
    border-bottom-left-radius: 4px;
    border: 1px solid var(--gris-borde);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .msg.user .bubble {
    background: var(--azul); color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,174,239,0.3);
  }

  .msg-time {
    font-size: 10px; color: var(--gris-texto);
    margin-top: 3px; padding: 0 4px; font-weight: 600;
  }

  .msg.user .msg-time { text-align: right; }

  /* Tags de intención/sentimiento */
  .msg-tags {
    display: flex; gap: 4px; margin-top: 4px;
    flex-wrap: wrap; padding-left: 34px;
  }

  .tag {
    font-size: 9px; font-family: 'Nunito', sans-serif; font-weight: 700;
    letter-spacing: 0.04em; padding: 2px 6px; border-radius: 10px; text-transform: uppercase;
  }

  .tag.intent { background: rgba(0,174,239,0.1); color: var(--azul); border: 1px solid rgba(0,174,239,0.2); }
  .tag.sent-positivo { background: rgba(92,184,92,0.1); color: var(--verde); border: 1px solid rgba(92,184,92,0.25); }
  .tag.sent-negativo { background: rgba(230,51,41,0.1); color: var(--rojo); border: 1px solid rgba(230,51,41,0.2); }
  .tag.sent-neutral  { background: rgba(136,153,170,0.1); color: var(--gris-texto); border: 1px solid var(--gris-borde); }
  .tag.conf { background: rgba(245,168,0,0.1); color: #B87D00; border: 1px solid rgba(245,168,0,0.2); }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 14px; background: white;
    border: 1px solid var(--gris-borde);
    border-radius: 18px; border-bottom-left-radius: 4px;
    width: fit-content;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    animation: bounce 1.2s infinite; opacity: 0.5;
  }

  .typing span:nth-child(1) { background: var(--azul); }
  .typing span:nth-child(2) { background: var(--amarillo); animation-delay: 0.2s; }
  .typing span:nth-child(3) { background: var(--verde); animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── SUGERENCIAS ── */
  .suggestions {
    padding: 8px 14px; display: flex; gap: 6px;
    overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
    background: white; border-top: 1px solid var(--gris-borde);
  }

  .suggestions::-webkit-scrollbar { display: none; }

  .chip {
    white-space: nowrap; font-size: 12px;
    font-family: 'Quicksand', sans-serif; font-weight: 700;
    color: var(--azul); background: rgba(0,174,239,0.08);
    border: 1.5px solid rgba(0,174,239,0.25);
    padding: 6px 12px; border-radius: 20px;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }

  .chip:hover {
    background: var(--azul); color: white; border-color: var(--azul);
    transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,174,239,0.3);
  }

  /* ── INPUT ── */
  .input-area {
    padding: 10px 14px 14px; border-top: 1px solid var(--gris-borde);
    display: flex; gap: 10px; align-items: flex-end;
    background: white; flex-shrink: 0;
  }

  .input-box {
    flex: 1; background: var(--gris-fondo);
    border: 1.5px solid var(--gris-borde); border-radius: 22px;
    padding: 10px 16px; color: #2D3748;
    font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 500;
    resize: none; outline: none; max-height: 100px; line-height: 1.4;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .input-box::placeholder { color: var(--gris-texto); }

  .input-box:focus {
    border-color: var(--azul); background: white;
    box-shadow: 0 0 0 3px rgba(0,174,239,0.12);
  }

  .send-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--azul); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
    box-shadow: 0 3px 10px rgba(0,174,239,0.35);
  }

  .send-btn:hover  { background: var(--azul-oscuro); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: var(--gris-borde); cursor: not-allowed; box-shadow: none; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* ── CONFIG URL ── */
  .url-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(8px);
    border-top: 1px solid var(--gris-borde);
    padding: 8px 14px; display: flex; gap: 8px; align-items: center;
    z-index: 100; font-size: 12px; box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }

  .url-bar label { color: var(--gris-texto); white-space: nowrap; font-size: 11px; font-weight: 600; }

  .url-input {
    flex: 1; background: var(--gris-fondo);
    border: 1.5px solid var(--gris-borde); border-radius: 8px;
    padding: 6px 10px; color: #2D3748;
    font-family: 'Quicksand', sans-serif; font-size: 12px; outline: none;
  }

  .url-input:focus { border-color: var(--azul); }

  .url-save {
    background: var(--amarillo); border: none; border-radius: 8px;
    padding: 6px 14px; color: white; font-size: 12px;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }

  .url-save:hover { background: #D99200; }

  /* Toast */
  .toast {
    position: fixed; top: 16px; left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: var(--verde); color: white;
    padding: 8px 20px; border-radius: 20px;
    font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 200; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(92,184,92,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--rojo); box-shadow: 0 4px 16px rgba(230,51,41,0.4); }
</style>
</head>
<body>

<div class="chat-wrapper" id="chatWrapper">

  <!-- Header -->
  <div class="header">
    <div class="avatar" id="headerAvatar">
      <img src="logo.png" alt="Gōku Lab" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'avatar-fallback\'>GL</span>'"/>
    </div>
    <div class="header-info">
      <div class="header-name">Asistente Gōku Lab</div>
      <div class="header-status"><span class="dot-verde"></span> En línea</div>
    </div>
    <div class="header-badge">BETA</div>
  </div>

  <!-- Mensajes -->
  <div class="messages" id="messages">
    <div class="date-sep">HOY</div>
    <div class="msg bot">
      <div class="msg-row">
        <div class="bot-icon">
          <img src="logo.png" alt="GL" onerror="this.parentElement.innerHTML='<span class=&quot;bot-icon-fallback&quot;>GL</span>'"/>
        </div>
        <div class="bubble">
          ¡Hola! 👋 Soy el asistente de <strong>Gōku Lab</strong>. Puedo ayudarte con información sobre cursos, horarios, costos, ubicación y más. ¿En qué te puedo ayudar?
        </div>
      </div>
      <div class="msg-time" style="padding-left:34px">ahora</div>
    </div>
  </div>

  <!-- Sugerencias rápidas -->
  <div class="suggestions" id="suggestions">
    <div class="chip" onclick="sendSuggestion('¿Cuánto cuestan los cursos?')">💰 Costos</div>
    <div class="chip" onclick="sendSuggestion('¿Qué cursos tienen disponibles?')">📚 Cursos</div>
    <div class="chip" onclick="sendSuggestion('¿Qué horarios manejan?')">🕐 Horarios</div>
    <div class="chip" onclick="sendSuggestion('¿Dónde están ubicados?')">📍 Ubicación</div>
    <div class="chip" onclick="sendSuggestion('¿Dan certificado?')">🎓 Certificación</div>
    <div class="chip" onclick="sendSuggestion('¿Tienen clase de prueba?')">🎯 Clase demo</div>
    <div class="chip" onclick="sendSuggestion('¿Cuáles son las formas de pago?')">💳 Pagos</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      class="input-box"
      id="msgInput"
      placeholder="Escribe tu pregunta..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>

</div>

<!-- Barra de configuración de URL -->
<div class="url-bar">
  <label>🔗 Backend:</label>
  <input class="url-input" id="urlInput" type="text" placeholder="https://tu-ngrok-url.ngrok-free.app"/>
  <button class="url-save" onclick="saveUrl()">Guardar</button>
</div>

<!-- Toast de notificación -->
<div class="toast" id="toast"></div>

<script>
  // ── LÓGICA ORIGINAL (primer código) ────────────────────────────
  let API_URL = localStorage.getItem('gokulab_api_url') || 'https://chatbot-gokulab-valeria.onrender.com';
  const USER_ID = 'tester_' + Math.random().toString(36).substr(2, 6);
  let isSending = false;

  // Cargar URL guardada en el input
  document.getElementById('urlInput').value = API_URL;

  function saveUrl() {
    const val = document.getElementById('urlInput').value.trim().replace(/\/$/, '');
    if (!val) return;
    API_URL = val;
    localStorage.setItem('gokulab_api_url', val);
    showToast(' URL guardada');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function getTime() {
    return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function appendMsg(role, text, meta = null) {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    if (role === 'bot') {
      // Fila con ícono + burbuja (estilo diseño azul)
      const row = document.createElement('div');
      row.className = 'msg-row';

      const iconDiv = document.createElement('div');
      iconDiv.className = 'bot-icon';
      iconDiv.innerHTML = `<img src="logo.png" alt="GL" onerror="this.parentElement.innerHTML='<span class=&quot;bot-icon-fallback&quot;>GL</span>'"/>`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      row.appendChild(iconDiv);
      row.appendChild(bubble);
      wrap.appendChild(row);

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.style.paddingLeft = '34px';
      time.textContent = getTime();
      wrap.appendChild(time);


    } else {
      // Mensaje del usuario
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = getTime();
      wrap.appendChild(time);
    }

    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = `
      <div class="msg-row">
        <div class="bot-icon">
          <img src="logo.png" alt="GL" onerror="this.parentElement.innerHTML='<span class=&quot;bot-icon-fallback&quot;>GL</span>'"/>
        </div>
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage(text = null) {
    if (isSending) return;
    const input = document.getElementById('msgInput');
    const msg = text || input.value.trim();
    if (!msg) return;

    isSending = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMsg('user', msg);
    showTyping();

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje: msg, numero: USER_ID }),
      });

      hideTyping();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      appendMsg('bot', data.respuesta);

    } catch (err) {
      hideTyping();
      appendMsg('bot', 'No pude conectarme al servidor. Verifica que Flask esté corriendo y que la URL sea correcta.');
      showToast('Error de conexión', true);
      console.error(err);
    }

    isSending = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function sendSuggestion(text) {
    sendMessage(text);
  }
</script>

</body>
</html>
