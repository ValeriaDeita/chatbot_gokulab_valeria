<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goku Lab — Asistente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --naranja: #FF6B1A;
    --naranja-oscuro: #E05500;
    --negro: #0D0D0D;
    --gris-oscuro: #1A1A1A;
    --gris-medio: #2A2A2A;
    --gris-borde: #333;
    --gris-texto: #999;
    --blanco: #F5F2EE;
    --burbuja-bot: #1E1E1E;
    --burbuja-user: #FF6B1A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--negro);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Fondo animado sutil */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(255,107,26,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(255,107,26,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .chat-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--gris-oscuro);
    border-left: 1px solid var(--gris-borde);
    border-right: 1px solid var(--gris-borde);
  }

  /* ── HEADER ── */
  .header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--gris-borde);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--gris-oscuro);
    flex-shrink: 0;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--naranja);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
    border: 2px solid var(--gris-oscuro);
  }

  .header-info {
    flex: 1;
  }

  .header-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--blanco);
    letter-spacing: 0.01em;
  }

  .header-status {
    font-size: 12px;
    color: #22c55e;
    margin-top: 1px;
  }

  .header-badge {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--naranja);
    background: rgba(255,107,26,0.12);
    border: 1px solid rgba(255,107,26,0.25);
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  /* ── MENSAJES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 2px; }

  /* Fecha separadora */
  .date-sep {
    text-align: center;
    font-size: 11px;
    color: var(--gris-texto);
    margin: 8px 0;
    letter-spacing: 0.04em;
  }

  /* Burbuja */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
  }

  .msg.bot .bubble {
    background: var(--burbuja-bot);
    color: var(--blanco);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--gris-borde);
  }

  .msg.user .bubble {
    background: var(--burbuja-user);
    color: white;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  .msg-time {
    font-size: 10px;
    color: var(--gris-texto);
    margin-top: 3px;
    padding: 0 4px;
  }

  .msg.user .msg-time { text-align: right; }

  /* Tags de intención/sentimiento */
  .msg-tags {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 9px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    border-radius: 10px;
    text-transform: uppercase;
  }

  .tag.intent {
    background: rgba(255,107,26,0.1);
    color: var(--naranja);
    border: 1px solid rgba(255,107,26,0.2);
  }

  .tag.sent-positivo { background: rgba(34,197,94,0.1);  color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
  .tag.sent-negativo { background: rgba(239,68,68,0.1);  color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
  .tag.sent-neutral  { background: rgba(156,163,175,0.1); color: #9ca3af; border: 1px solid rgba(156,163,175,0.2); }

  .tag.conf { background: rgba(255,255,255,0.05); color: var(--gris-texto); border: 1px solid var(--gris-borde); }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 14px;
    background: var(--burbuja-bot);
    border: 1px solid var(--gris-borde);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    animation: popIn 0.22s ease both;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--gris-texto);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── SUGERENCIAS ── */
  .suggestions {
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
    border-top: 1px solid var(--gris-borde);
  }

  .suggestions::-webkit-scrollbar { display: none; }

  .chip {
    white-space: nowrap;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--naranja);
    background: rgba(255,107,26,0.08);
    border: 1px solid rgba(255,107,26,0.2);
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .chip:hover {
    background: rgba(255,107,26,0.18);
    border-color: rgba(255,107,26,0.4);
  }

  /* ── INPUT ── */
  .input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--gris-borde);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--gris-oscuro);
    flex-shrink: 0;
  }

  .input-box {
    flex: 1;
    background: var(--gris-medio);
    border: 1px solid var(--gris-borde);
    border-radius: 22px;
    padding: 10px 16px;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.4;
    transition: border-color 0.15s;
  }

  .input-box::placeholder { color: var(--gris-texto); }
  .input-box:focus { border-color: rgba(255,107,26,0.5); }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--naranja);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .send-btn:hover  { background: var(--naranja-oscuro); }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { background: var(--gris-borde); cursor: not-allowed; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* ── CONFIG URL ── */
  .url-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(8px);
    border-top: 1px solid var(--gris-borde);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 100;
    font-size: 12px;
  }

  .url-bar label { color: var(--gris-texto); white-space: nowrap; font-size: 11px; }

  .url-input {
    flex: 1;
    background: var(--gris-medio);
    border: 1px solid var(--gris-borde);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    outline: none;
  }

  .url-input:focus { border-color: rgba(255,107,26,0.5); }

  .url-save {
    background: var(--naranja);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    color: white;
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: #22c55e;
    color: white;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #ef4444; }
</style>
</head>
<body>

<div class="chat-wrapper" id="chatWrapper">

  <!-- Header -->
  <div class="header">
    <div class="avatar">GL</div>
    <div class="header-info">
      <div class="header-name">Asistente Goku Lab</div>
      <div class="header-status">● En línea</div>
    </div>
    <div class="header-badge">BETA</div>
  </div>

  <!-- Mensajes -->
  <div class="messages" id="messages">
    <div class="date-sep">HOY</div>
    <div class="msg bot">
      <div class="bubble">
        ¡Hola! 👋 Soy el asistente de <strong>Goku Lab</strong>. Puedo ayudarte con información sobre cursos, horarios, costos, ubicación y más. ¿En qué te puedo ayudar?
      </div>
      <div class="msg-time">ahora</div>
    </div>
  </div>

  <!-- Sugerencias rápidas -->
  <div class="suggestions" id="suggestions">
    <div class="chip" onclick="sendSuggestion('¿Cuánto cuestan los cursos?')">💰 Costos</div>
    <div class="chip" onclick="sendSuggestion('¿Qué cursos tienen disponibles?')">📚 Cursos</div>
    <div class="chip" onclick="sendSuggestion('¿Qué horarios manejan?')">🕐 Horarios</div>
    <div class="chip" onclick="sendSuggestion('¿Dónde están ubicados?')">📍 Ubicación</div>
    <div class="chip" onclick="sendSuggestion('¿Dan certificado?')">🎓 Certificación</div>
    <div class="chip" onclick="sendSuggestion('¿Tienen clase de prueba?')">🎯 Clase demo</div>
    <div class="chip" onclick="sendSuggestion('¿Cuáles son las formas de pago?')">💳 Pagos</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      class="input-box"
      id="msgInput"
      placeholder="Escribe tu pregunta..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>

</div>

<!-- Barra de configuración de URL -->
<div class="url-bar">
  <label>🔗 Backend:</label>
  <input class="url-input" id="urlInput" type="text" value="http://127.0.0.1:5000" placeholder="https://tu-ngrok-url.ngrok-free.app"/>
  <button class="url-save" onclick="saveUrl()">Guardar</button>
</div>

<!-- Toast de notificación -->
<div class="toast" id="toast"></div>

<script>
  let API_URL = localStorage.getItem('gokulab_api_url') || 'https://chatbot-gokulab-valeria.onrender.com';
  const USER_ID = 'tester_' + Math.random().toString(36).substr(2, 6);
  let isSending = false;

  // Cargar URL guardada
  document.getElementById('urlInput').value = API_URL;

  // Ajustar padding para que la url-bar no tape el input
  document.getElementById('chatWrapper').style.paddingBottom = '52px';

  function saveUrl() {
    const val = document.getElementById('urlInput').value.trim().replace(/\/$/, '');
    if (!val) return;
    API_URL = val;
    localStorage.setItem('gokulab_api_url', val);
    showToast('✅ URL guardada');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function getTime() {
    return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function appendMsg(role, text, meta = null) {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    wrap.appendChild(bubble);
    wrap.appendChild(time);

    // Tags de debug (solo en respuestas del bot)
    if (meta && role === 'bot') {
      const tags = document.createElement('div');
      tags.className = 'msg-tags';

      if (meta.intencion) {
        const t = document.createElement('span');
        t.className = 'tag intent';
        t.textContent = meta.intencion.replace('_', ' ');
        tags.appendChild(t);
      }
      if (meta.confianza) {
        const t = document.createElement('span');
        t.className = 'tag conf';
        t.textContent = meta.confianza;
        tags.appendChild(t);
      }
      if (meta.sentimiento) {
        const t = document.createElement('span');
        t.className = `tag sent-${meta.sentimiento}`;
        const emoji = { positivo: '😊', negativo: '😟', neutral: '😐' };
        t.textContent = (emoji[meta.sentimiento] || '') + ' ' + meta.sentimiento;
        tags.appendChild(t);
      }

      wrap.appendChild(tags);
    }

    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage(text = null) {
    if (isSending) return;
    const input = document.getElementById('msgInput');
    const msg = text || input.value.trim();
    if (!msg) return;

    isSending = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMsg('user', msg);
    showTyping();

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje: msg, numero: USER_ID }),
      });

      hideTyping();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      appendMsg('bot', data.respuesta, {
        intencion:   data.intencion,
        confianza:   data.confianza,
        sentimiento: data.sentimiento,
      });

    } catch (err) {
      hideTyping();
      appendMsg('bot', '⚠️ No pude conectarme al servidor. Verifica que Flask esté corriendo y que la URL sea correcta.');
      showToast('Error de conexión', true);
      console.error(err);
    }

    isSending = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function sendSuggestion(text) {
    sendMessage(text);
  }
</script>

</body>
</html>
