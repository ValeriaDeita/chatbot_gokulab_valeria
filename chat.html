<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gōku, Tu amigo y asistente</title>
<link rel="icon" type="image/png" href="/logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul:        #00AEEF;
    --azul-oscuro: #0090C8;
    --amarillo:    #F5A800;
    --rojo:        #E63329;
    --verde:       #5CB85C;
    --blanco:      #FFFFFF;
    --gris-fondo:  #F4F7FB;
    --gris-borde:  #E2EAF4;
    --gris-texto:  #8899AA;
    --sombra:      0 2px 16px rgba(0,174,239,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--gris-fondo);
    font-family: 'Quicksand', sans-serif;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 15% 15%, rgba(0,174,239,0.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 85%, rgba(245,168,0,0.07) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .chat-wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 440px; height: 100dvh;
    display: flex; flex-direction: column;
    background: var(--blanco);
    box-shadow: var(--sombra);
    border-left: 1px solid var(--gris-borde);
    border-right: 1px solid var(--gris-borde);
  }


  .header {
    padding: 14px 18px;
    background: var(--azul);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  .header::after {
    content: ''; position: absolute; right: -20px; top: -20px;
    width: 90px; height: 90px; background: rgba(255,255,255,0.08); border-radius: 50%;
  }
  .header::before {
    content: ''; position: absolute; right: 30px; bottom: -30px;
    width: 60px; height: 60px; background: rgba(245,168,0,0.15); border-radius: 50%;
  }

  .avatar {
    width: 46px; height: 46px; border-radius: 50%; background: white;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.4);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: relative;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-fallback { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 16px; color: var(--azul); }

  .header-info { flex: 1; }
  .header-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; color: white; }
  .header-status { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 1px; display: flex; align-items: center; gap: 4px; }

  .dot-verde {
    width: 7px; height: 7px; background: #7FE87F; border-radius: 50%;
    display: inline-block; animation: pulso 2s infinite;
  }
  @keyframes pulso {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .header-actions { display: flex; align-items: center; gap: 6px; position: relative; z-index: 1; }

  .header-badge {
    font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 700;
    color: var(--azul); background: white;
    padding: 3px 8px; border-radius: 20px;
  }

  .clear-btn {
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px; padding: 4px 8px; cursor: pointer;
    color: white; font-size: 11px; font-family: 'Nunito', sans-serif; font-weight: 700;
    display: flex; align-items: center; gap: 4px;
    transition: background 0.15s;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.28); }
  .clear-btn svg { width: 12px; height: 12px; fill: white; }

 
  .messages-wrap { flex: 1; position: relative; overflow: hidden; }

  .messages {
    height: 100%; overflow-y: auto;
    padding: 12px;
    display: flex; flex-direction: column; gap: 6px;
    scroll-behavior: smooth;
    background: var(--gris-fondo);
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 2px; }


  .scroll-btn {
    position: absolute; bottom: 12px; right: 12px;
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--azul); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 10px rgba(0,174,239,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 10;
  }
  .scroll-btn.visible { opacity: 1; pointer-events: all; }
  .scroll-btn:hover { transform: scale(1.1); }
  .scroll-btn svg { width: 16px; height: 16px; fill: white; }

  .date-sep {
    text-align: center; font-size: 11px; color: var(--gris-texto);
    margin: 4px 0 6px; letter-spacing: 0.06em; font-weight: 600;
  }

  .msg {
    display: flex; flex-direction: column; max-width: 78%;
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    position: relative;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg.bot  { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .msg.bot .msg-row { display: flex; align-items: flex-end; gap: 6px; }

  .bot-icon {
    width: 26px; height: 26px; border-radius: 50%; background: var(--azul);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .bot-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .bot-icon-fallback { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 10px; color: white; }

  .bubble {
    padding: 8px 12px; border-radius: 16px;
    font-size: 13px; line-height: 1.45;
    word-break: break-word; font-weight: 500; max-width: 100%;
  }
  .msg.bot .bubble {
    background: white; color: #2D3748;
    border-bottom-left-radius: 4px;
    border: 1px solid var(--gris-borde);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .msg.user .bubble {
    background: var(--azul); color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,174,239,0.3);
  }

  /* Cursor typewriter */
  .tw-cursor {
    display: inline-block;
    width: 2px; height: 13px;
    background: #2D3748;
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }


  .reaction-bar {
    display: none;
    position: absolute;
    left: 32px;
    bottom: 26px;
    background: white;
    border: 1px solid var(--gris-borde);
    border-radius: 24px;
    padding: 4px 8px;
    gap: 2px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    z-index: 20;
    flex-direction: row;
    align-items: center;
  }
  .msg.bot:hover .reaction-bar { display: flex; }

  .react-emoji {
    font-size: 17px; cursor: pointer;
    padding: 3px 4px; border-radius: 8px;
    border: none; background: none;
    transition: transform 0.15s, background 0.1s;
    line-height: 1;
  }
  .react-emoji:hover {
    transform: scale(1.4);
    background: var(--gris-fondo);
  }

  .reactions-row {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 4px; padding-left: 32px;
  }
  .reaction-pill {
    display: inline-flex; align-items: center; gap: 3px;
    background: white; border: 1.5px solid var(--gris-borde);
    border-radius: 12px; padding: 2px 8px;
    font-size: 13px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .reaction-pill:hover { border-color: var(--azul); background: rgba(0,174,239,0.06); }
  .reaction-pill.reacted { border-color: var(--azul); background: rgba(0,174,239,0.10); }
  .reaction-pill .r-count {
    font-size: 11px; font-weight: 700; color: var(--gris-texto);
  }
  .reaction-pill.reacted .r-count { color: var(--azul); }

  
  .msg-footer {
    display: flex; align-items: center; gap: 6px;
    margin-top: 2px; padding: 0 4px;
  }
  .msg.bot .msg-footer { padding-left: 32px; }
  .msg.user .msg-footer { justify-content: flex-end; }

  .msg-time { font-size: 10px; color: var(--gris-texto); font-weight: 600; }

  .copy-btn {
    background: none; border: none; cursor: pointer; padding: 2px;
    color: var(--gris-texto); display: flex; align-items: center;
    opacity: 0; transition: opacity 0.15s, color 0.15s;
    border-radius: 4px;
  }
  .msg:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--azul); }
  .copy-btn svg { width: 11px; height: 11px; }
  .copy-btn.copied { color: var(--verde); opacity: 1; }

 
  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 12px; background: white;
    border: 1px solid var(--gris-borde);
    border-radius: 16px; border-bottom-left-radius: 4px;
    width: fit-content; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    animation: bounce 1.2s infinite; opacity: 0.5;
  }
  .typing span:nth-child(1) { background: var(--azul); }
  .typing span:nth-child(2) { background: var(--amarillo); animation-delay: 0.2s; }
  .typing span:nth-child(3) { background: var(--verde); animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .suggestions {
    padding: 6px 12px;
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    background: white; border-top: 1px solid var(--gris-borde);
  }
  .chip {
    white-space: nowrap; font-size: 11px;
    font-family: 'Quicksand', sans-serif; font-weight: 700;
    color: var(--azul); background: rgba(0,174,239,0.08);
    border: 1.5px solid rgba(0,174,239,0.25);
    padding: 5px 10px; border-radius: 20px;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .chip:hover {
    background: var(--azul); color: white; border-color: var(--azul);
    transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,174,239,0.3);
  }

  /* ── INPUT ── */
  .input-area {
    padding: 8px 12px 12px; border-top: 1px solid var(--gris-borde);
    display: flex; gap: 8px; align-items: flex-end;
    background: white; flex-shrink: 0;
  }
  .input-box {
    flex: 1; background: var(--gris-fondo);
    border: 1.5px solid var(--gris-borde); border-radius: 20px;
    padding: 9px 14px; color: #2D3748;
    font-family: 'Quicksand', sans-serif; font-size: 13px; font-weight: 500;
    resize: none; outline: none; max-height: 100px; line-height: 1.4;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-box::placeholder { color: var(--gris-texto); }
  .input-box:focus {
    border-color: var(--azul); background: white;
    box-shadow: 0 0 0 3px rgba(0,174,239,0.12);
  }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--azul); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
    box-shadow: 0 3px 10px rgba(0,174,239,0.35);
  }
  .send-btn:hover  { background: var(--azul-oscuro); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: var(--gris-borde); cursor: not-allowed; box-shadow: none; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }

  /* Toast */
  .toast {
    position: fixed; top: 16px; left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: var(--verde); color: white;
    padding: 8px 20px; border-radius: 20px;
    font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 200; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(92,184,92,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--rojo); box-shadow: 0 4px 16px rgba(230,51,41,0.4); }
</style>
</head>
<body>

<div class="chat-wrapper" id="chatWrapper">

  <!-- Header -->
  <div class="header">
    <div class="avatar">
      <img src="/logo.png" alt="Gōku Lab" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'avatar-fallback\'>GL</span>'"/>
    </div>
    <div class="header-info">
      <div class="header-name">Súper Agente Gōku</div>
      <div class="header-status"><span class="dot-verde"></span> En línea</div>
    </div>
    <div class="header-actions">
      <div class="header-badge">Do it!</div>
      <button class="clear-btn" onclick="clearChat()" title="Limpiar conversación">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        Limpiar
      </button>
    </div>
  </div>


  <div class="messages-wrap">
    <div class="messages" id="messages">
      <div class="date-sep">HOY</div>
      <div class="msg bot">
        <div class="msg-row">
          <div class="bot-icon">
            <img src="/logo.png" alt="GL" onerror="this.parentElement.innerHTML='<span class=&quot;bot-icon-fallback&quot;>GL</span>'"/>
          </div>
          <div class="bubble" id="welcome-bubble"></div>
        </div>
        <div class="msg-footer">
          <span class="msg-time">ahora</span>
        </div>
      </div>
    </div>
    <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()" title="Ir al final">
      <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </button>
  </div>

  <div class="suggestions" id="suggestions">
    <div class="chip" onclick="sendSuggestion('¿Cuánto cuestan los cursos?')">💰 Costos</div>
    <div class="chip" onclick="sendSuggestion('¿Qué cursos tienen disponibles?')">📚 Cursos</div>
    <div class="chip" onclick="sendSuggestion('¿Qué horarios manejan?')">🕐 Horarios</div>
    <div class="chip" onclick="sendSuggestion('¿Dónde están ubicados?')">📍 Ubicación</div>
    <div class="chip" onclick="sendSuggestion('¿Dan certificado?')">🎓 Certificación</div>
    <div class="chip" onclick="sendSuggestion('¿Tienen clase de prueba?')">🎯 Clase demo</div>
    <div class="chip" onclick="sendSuggestion('¿Cuáles son las formas de pago?')">💳 Pagos</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      class="input-box"
      id="msgInput"
      placeholder="Escribe tu pregunta..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="handleInput(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let API_URL = localStorage.getItem('gokulab_api_url') || 'https://chatbot-gokulab-valeria.onrender.com';
  const USER_ID = 'tester_' + Math.random().toString(36).substr(2, 6);
  let isSending = false;

  const REACTION_EMOJIS = ['❤️', '👍', '😄', '🤔', '🙌'];

  function typewriter(el, text, speed, onDone) {
    el.innerHTML = '';
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'tw-cursor';
    el.appendChild(cursor);

    const iv = setInterval(() => {
      if (i >= text.length) {
        clearInterval(iv);
        cursor.remove();
        if (onDone) onDone();
        return;
      }
      el.insertBefore(document.createTextNode(text[i]), cursor);
      i++;
    }, speed);
  }

  // reactions = { msgId: { emoji: { count, reacted } } }
  const reactionsMap = {};

  function buildReactionBar(msgId) {
    const bar = document.createElement('div');
    bar.className = 'reaction-bar';
    REACTION_EMOJIS.forEach(emoji => {
      const btn = document.createElement('button');
      btn.className = 'react-emoji';
      btn.textContent = emoji;
      btn.title = emoji;
      btn.onclick = (e) => {
        e.stopPropagation();
        toggleReaction(msgId, emoji);
      };
      bar.appendChild(btn);
    });
    return bar;
  }

  function toggleReaction(msgId, emoji) {
    if (!reactionsMap[msgId]) reactionsMap[msgId] = {};
    if (!reactionsMap[msgId][emoji]) reactionsMap[msgId][emoji] = { count: 0, reacted: false };

    const r = reactionsMap[msgId][emoji];
    if (r.reacted) {
      r.count--;
      r.reacted = false;
      if (r.count === 0) delete reactionsMap[msgId][emoji];
    } else {
      r.count++;
      r.reacted = true;
    }

    renderReactionPills(msgId);
  }

  function renderReactionPills(msgId) {
    const wrap = document.getElementById(msgId);
    if (!wrap) return;

    let row = wrap.querySelector('.reactions-row');
    if (!row) {
      row = document.createElement('div');
      row.className = 'reactions-row';
      wrap.appendChild(row);
    }

    row.innerHTML = '';
    const data = reactionsMap[msgId] || {};

    Object.entries(data).forEach(([emoji, info]) => {
      const pill = document.createElement('button');
      pill.className = 'reaction-pill' + (info.reacted ? ' reacted' : '');
      pill.innerHTML = `${emoji} <span class="r-count">${info.count}</span>`;
      pill.onclick = () => toggleReaction(msgId, emoji);
      row.appendChild(pill);
    });
  }


  function playPop() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }


  const msgsEl = document.getElementById('messages');
  const scrollBtn = document.getElementById('scrollBtn');

  msgsEl.addEventListener('scroll', () => {
    const distFromBottom = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight;
    scrollBtn.classList.toggle('visible', distFromBottom > 80);
  });

  function scrollToBottom() {
    msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });
  }

  function clearChat() {
    const msgs = document.getElementById('messages');
    msgs.innerHTML = `
      <div class="date-sep">HOY</div>
      <div class="msg bot">
        <div class="msg-row">
          <div class="bot-icon">
            <img src="/logo.png" alt="GL" onerror="this.parentElement.innerHTML='<span class=&quot;bot-icon-fallback&quot;>GL</span>'"/>
          </div>
          <div class="bubble" id="welcome-bubble-new"></div>
        </div>
        <div class="msg-footer"><span class="msg-time">${getTime()}</span></div>
      </div>`;

    const wb = document.getElementById('welcome-bubble-new');
    typewriter(wb, '¡Hola! Soy Gōku. Puedo ayudarte con información sobre cursos, horarios, costos, ubicación y más. ¿En qué te puedo ayudar?', 25);
    showToast('Conversación reiniciada');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function getTime() {
    return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleInput(el) { autoResize(el); }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function copiarTexto(btn, texto) {
    navigator.clipboard.writeText(texto).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;
      }, 2000);
    }).catch(() => showToast('No se pudo copiar', true));
  }

  let msgCounter = 0;

  function appendMsg(role, text) {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    if (role === 'bot') {
      msgCounter++;
      const msgId = `bot-msg-${msgCounter}`;
      wrap.id = msgId;

      const row = document.createElement('div');
      row.className = 'msg-row';

      const iconDiv = document.createElement('div');
      iconDiv.className = 'bot-icon';
      iconDiv.innerHTML = `<img src="/logo.png" alt="GL" onerror="this.parentElement.innerHTML='<span class=&quot;bot-icon-fallback&quot;>GL</span>'"/>`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      row.appendChild(iconDiv);
      row.appendChild(bubble);
      wrap.appendChild(row);

      const footer = document.createElement('div');
      footer.className = 'msg-footer';

      const time = document.createElement('span');
      time.className = 'msg-time';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.title = 'Copiar';
      copyBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;
      copyBtn.onclick = () => copiarTexto(copyBtn, text);

      footer.appendChild(time);
      footer.appendChild(copyBtn);
      wrap.appendChild(footer);

      wrap.appendChild(buildReactionBar(msgId));

      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;


      const speed = text.length > 150 ? 15 : 25;
      typewriter(bubble, text, speed, () => {
        time.textContent = getTime();
        msgs.scrollTop = msgs.scrollHeight;
      });

    } else {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);

      const footer = document.createElement('div');
      footer.className = 'msg-footer';
      const time = document.createElement('span');
      time.className = 'msg-time';
      time.textContent = getTime();
      footer.appendChild(time);
      wrap.appendChild(footer);

      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = `
      <div class="msg-row">
        <div class="bot-icon">
          <img src="/logo.png" alt="GL" onerror="this.parentElement.innerHTML='<span class=&quot;bot-icon-fallback&quot;>GL</span>'"/>
        </div>
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage(text = null) {
    if (isSending) return;
    const input = document.getElementById('msgInput');
    const msg = text || input.value.trim();
    if (!msg) return;

    isSending = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMsg('user', msg);
    showTyping();

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje: msg, numero: USER_ID }),
      });

      hideTyping();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      appendMsg('bot', data.respuesta);
      playPop();

    } catch (err) {
      hideTyping();
      appendMsg('bot', 'No pude conectarme al servidor. Verifica que Flask esté corriendo y que la URL sea correcta.');
      showToast('Error de conexión', true);
      console.error(err);
    }

    isSending = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function sendSuggestion(text) { sendMessage(text); }

  // ── INIT: typewriter en mensaje de bienvenida ───────────────
  window.addEventListener('DOMContentLoaded', () => {
    const wb = document.getElementById('welcome-bubble');
    if (wb) {
      typewriter(wb, '¡Hola! Soy Gōku. Puedo ayudarte con información sobre cursos, horarios, costos, ubicación y más. ¿En qué te puedo ayudar?', 25);
    }
  });
</script>
